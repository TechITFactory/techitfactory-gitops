apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: user-service
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: NODE_ENV
          value: "production"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        # Optional: seed an admin user on first boot
        # Create with: kubectl create secret generic app-secrets --from-literal=seed-admin-email=admin@techitfactory.com --from-literal=seed-admin-password=<PASS> -n techitfactory
        - name: SEED_ADMIN_EMAIL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: seed-admin-email
              optional: true
        - name: SEED_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: seed-admin-password
              optional: true

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api-gateway
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        env:
        - name: NODE_ENV
          value: "production"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        # Internal cluster DNS — no need to override in most cases
        - name: USER_SERVICE_URL
          value: "http://user-service"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service"
        - name: ORDER_SERVICE_URL
          value: "http://order-service"
        - name: CART_SERVICE_URL
          value: "http://cart-service"
        # Comma-separated list of allowed CORS origins — override per environment
        - name: ALLOWED_ORIGINS
          value: "http://localhost,http://localhost:3000"

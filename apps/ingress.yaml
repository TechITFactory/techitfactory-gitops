apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_ORG/techitfactory-gitops.git
    targetRevision: main
    path: environments/dev
    directory:
      include: ingress.yaml   # only deploy ingress.yaml from this directory
  destination:
    server: https://kubernetes.default.svc
    namespace: techitfactory
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

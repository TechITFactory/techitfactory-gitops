# =============================================================================
# METRICS SERVER — ArgoCD Application
# =============================================================================
# Required for `kubectl top` and HorizontalPodAutoscaler (HPA).
# =============================================================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    targetRevision: "3.12.2"
    helm:
      values: |
        args:
          - --kubelet-preferred-address-types=InternalIP
          - --kubelet-insecure-tls

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

        replicas: 1

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
